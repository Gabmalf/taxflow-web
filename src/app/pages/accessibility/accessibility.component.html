<div class="mb-4">
  <h2 class="fw-bold">Accesibilidad</h2>
  <p class="text-muted">Personaliza la apariencia de la plataforma para una mejor experiencia.</p>
</div>

<div class="tf-card max-w-800 mx-auto">
  <div class="list-group list-group-flush">
    <div class="list-group-item py-4 d-flex justify-content-between align-items-center">
      <div>
        <h5 class="fw-bold mb-1"><i class="bi bi-eye me-2"></i> Modo para Daltónicos</h5>
        <p class="text-muted mb-0 small">Ajusta la paleta de colores para una mejor distinción visual.</p>
      </div>
      <div class="form-check form-switch">
        <input class="form-check-input fs-4" type="checkbox" role="switch" [checked]="colorblindMode" (change)="toggleColorblindMode()">
      </div>
    </div>

  </div>
  
  <div class="alert alert-info border-0 mt-4 mb-0">
    <i class="bi bi-info-circle me-2"></i> Estas preferencias se guardarán en tu navegador para futuras sesiones.
  </div>
</div>
